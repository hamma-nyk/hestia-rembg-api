<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Remove.bg API Proxy Monitor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen p-8">
    <div class="max-w-2xl mx-auto">
        <header class="mb-10 text-center">
            <h1 class="text-3xl font-bold text-sky-400">API Proxy Dashboard</h1>
            <p class="text-slate-400">Status: <span id="api-status" class="text-green-400">Online</span></p>
        </header>

        <div class="bg-slate-800 p-6 rounded-xl shadow-xl border border-slate-700 mb-6">
            <label class="block mb-2 text-sm font-medium">Input Image URL</label>
            <input type="text" id="img-url" placeholder="https://example.com/image.jpg" 
                   class="w-full p-3 rounded bg-slate-700 border border-slate-600 focus:ring-2 focus:ring-sky-500 outline-none mb-4">
            <button onclick="processImage()" id="btn-submit"
                    class="w-full bg-sky-600 hover:bg-sky-500 py-3 rounded-lg font-semibold transition">
                Remove Background
            </button>
        </div>

        <div id="result-container" class="hidden bg-slate-800 p-6 rounded-xl border border-slate-700">
            <h2 class="text-lg font-semibold mb-4 text-sky-300">Result:</h2>
            <div class="flex flex-col items-center">
                <img id="output-img" class="max-w-full rounded shadow-lg border-2 border-dashed border-slate-600 mb-4">
                <a id="download-link" href="#" download="result.png" class="text-sm text-sky-400 hover:underline">Download PNG</a>
            </div>
        </div>

        <div class="mt-8">
            <h3 class="text-sm font-mono text-slate-500 uppercase mb-2">System Logs</h3>
            <div id="logs" class="bg-black p-4 rounded text-xs font-mono h-40 overflow-y-auto border border-slate-800 text-green-500">
                > System initialized...<br>
                > Ready to process requests.
            </div>
        </div>
    </div>

    <script>
        async function processImage() {
            const url = document.getElementById('img-url').value;
            const btn = document.getElementById('btn-submit');
            const logBox = document.getElementById('logs');
            
            if(!url) return alert("Masukkan URL Gambar!");

            btn.disabled = true;
            btn.innerText = "Processing...";
            logBox.innerHTML += `<br>> Sending request to /api/remove-bg...`;

            try {
                const response = await fetch('/remove-bg', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ imageUrl: url })
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const objectUrl = URL.createObjectURL(blob);
                    document.getElementById('output-img').src = objectUrl;
                    document.getElementById('download-link').href = objectUrl;
                    document.getElementById('result-container').classList.remove('hidden');
                    logBox.innerHTML += `<br><span class="text-blue-400">> Success: Background removed!</span>`;
                } else {
                    const err = await response.json();
                    logBox.innerHTML += `<br><span class="text-red-500">> Error: ${err.message}</span>`;
                }
            } catch (e) {
                logBox.innerHTML += `<br><span class="text-red-500">> Critical Error: Connection failed.</span>`;
            } finally {
                btn.disabled = false;
                btn.innerText = "Remove Background";
                logBox.scrollTop = logBox.scrollHeight;
            }
        }
    </script>
</body>
</html>
