<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hestia Background Remover</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/framer-motion@10.16.4/dist/framer-motion.js"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="icon" type="image/png" href="favicon.ico" />
    <style>
      body {
        font-family: "Inter", sans-serif;
        transition: background-color 0.3s ease;
      }

      /* Aurora Background */
      .aurora-bg {
        position: fixed; /* Tetap di belakang saat scroll */
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        overflow: hidden;
        background: #0d1117; /* Default dark */
      }

      .light .aurora-bg {
        background: #f0f2f5;
      }

      .aurora-blob {
        position: absolute;
        width: 800px;
        height: 800px;
        filter: blur(60px);
        opacity: 0.15;
        border-radius: 50%;
        animation: move 20s infinite alternate;
      }
      .blob-1 {
        background: #0969da;
        top: -10%;
        left: -10%;
      }
      .blob-2 {
        background: #515aa7;
        bottom: -10%;
        right: -10%;
        animation-delay: -5s;
      }

      @keyframes move {
        from {
          transform: translate(0, 0) rotate(0deg);
        }
        to {
          transform: translate(100px, 100px) rotate(360deg);
        }
      }

      /* Glass Cards */
      .glass-card {
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        transition:
          transform 0.2s ease,
          background-color 0.3s ease;
      }

      /* Dark Mode Styles */
      .dark .glass-card {
        background: rgba(22, 27, 34, 0.8);
        border-color: rgba(255, 255, 255, 0.05);
      }
      .dark .text-main {
        color: #ffffff;
      }
      .dark .text-sub {
        color: #8b949e;
      }

      /* Light Mode Styles */
      .light .glass-card {
        background: rgba(255, 255, 255, 0.7);
        border-color: rgba(0, 0, 0, 0.05);
      }
      .light .text-main {
        color: #1f2328;
      }
      .light .text-sub {
        color: #636c76;
      }
      .light .aurora-blob {
        opacity: 0.3;
      }

      /* Custom Scrollbar */
      #logs::-webkit-scrollbar {
        width: 4px;
      }
      #logs::-webkit-scrollbar-thumb {
        background: rgba(128, 128, 128, 0.3);
        border-radius: 10px;
      }
    </style>
  </head>
  <body class="dark min-h-screen">
    <div class="aurora-bg">
      <div class="aurora-blob blob-1"></div>
      <div class="aurora-blob blob-2"></div>
    </div>

    <div class="relative z-10 p-4 md:p-10 max-w-6xl mx-auto w-full">
      <header
        class="flex flex-col md:flex-row md:items-center justify-between mb-10 gap-4 opacity-0"
        id="header-anim"
      >
        <div class="flex items-center gap-3">
          <div
            class="bg-sky-500 rounded-lg shadow-lg shadow-sky-500/20 w-10 h-10 flex items-center justify-center"
          >
            <img
              src="hestia.png"
              alt="Logo"
              class="w-full h-full object-cover rounded-md"
            />
          </div>
          <h1 class="text-2xl font-bold text-main tracking-tight">Hestia</h1>
        </div>

        <div class="flex items-center gap-4">
          <button
            onclick="toggleTheme()"
            class="p-2 rounded-full glass-card hover:scale-110 active:scale-95 transition-all text-main"
          >
            <svg
              id="theme-icon"
              class="w-5 h-5"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            ></svg>
          </button>
          <div
            class="flex items-center gap-2 px-4 py-2 glass-card rounded-full text-xs font-semibold text-main"
          >
            <span class="relative flex h-2 w-2">
              <span
                class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"
              ></span>
              <span
                class="relative inline-flex rounded-full h-2 w-2 bg-green-500"
              ></span>
            </span>
            API Active
          </div>
        </div>
      </header>

      <main class="grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div id="card-left" class="lg:col-span-4 space-y-6 opacity-0">
          <div class="glass-card p-6 rounded-2xl shadow-xl">
            <h2
              class="text-lg font-bold text-main mb-6 flex items-center gap-2"
            >
              Upload Image
            </h2>

            <div class="space-y-4">
              <div
                class="p-4 border-2 border-dashed border-gray-500/20 rounded-xl hover:border-sky-500/50 transition-colors group"
              >
                <input
                  type="file"
                  id="file-input"
                  accept="image/*"
                  class="w-full text-sm text-sub file:mr-3 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-sky-500 file:text-white file:font-bold hover:file:bg-sky-600 cursor-pointer"
                />
              </div>

              <div class="text-center text-xs font-bold text-sub py-2">OR</div>

              <input
                type="text"
                id="img-url"
                placeholder="Paste image URL here..."
                class="w-full p-3 rounded-xl bg-gray-500/10 border border-gray-500/20 text-main placeholder-gray-500 focus:ring-2 focus:ring-sky-500 outline-none transition-all"
              />

              <button
                onclick="processAction()"
                id="btn-submit"
                class="w-full bg-sky-600 hover:bg-sky-500 text-white py-3 rounded-xl font-bold shadow-lg shadow-sky-600/30 transition-all active:scale-95 flex items-center justify-center gap-2"
              >
                <span>Process Now</span>
              </button>
            </div>
          </div>

          <div class="glass-card p-5 rounded-2xl shadow-lg">
            <div class="flex items-center justify-between mb-3">
              <span
                class="text-[10px] font-black uppercase tracking-widest text-sub"
                >System Terminal</span
              >
              <button
                onclick="
                  document.getElementById('logs').innerHTML =
                    '> Terminal cleared.'
                "
                class="text-[10px] text-sky-500 hover:underline"
              >
                Clear
              </button>
            </div>
            <div
              id="logs"
              class="bg-black/20 p-4 rounded-xl text-[11px] font-mono h-40 overflow-y-auto border border-white/5 transition-colors duration-300 text-sub"
            >
              > Core ready...<br />
              > Awaiting payload.
            </div>
          </div>
        </div>

        <div id="card-right" class="lg:col-span-8 opacity-0">
          <div
            class="glass-card p-6 rounded-2xl shadow-2xl h-full flex flex-col min-h-[400px]"
          >
            <div class="flex justify-between items-center mb-6">
              <h2 class="text-lg font-bold text-main">Output Preview</h2>
              <a
                id="download-link"
                href="#"
                download="hestia-rembg.png"
                class="hidden items-center gap-2 bg-green-600 hover:bg-green-500 text-white px-4 py-2 rounded-lg text-sm font-bold transition-all animate-bounce"
              >
                Download Image
              </a>
            </div>

            <div
              class="flex-grow flex items-center justify-center bg-black/10 rounded-2xl border border-gray-500/10 relative overflow-hidden"
            >
              <div id="placeholder-ctx" class="text-center opacity-30">
                <svg
                  class="w-20 h-20 mx-auto mb-4"
                  fill="none"
                  stroke="currentColor"
                  viewBox="0 0 24 24"
                >
                  <path
                    stroke-linecap="round"
                    stroke-linejoin="round"
                    stroke-width="1"
                    d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 16m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 002-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"
                  ></path>
                </svg>
                <p class="text-sm font-medium text-main">
                  Ready for processing
                </p>
              </div>
              <img
                id="output-img"
                class="hidden max-w-full max-h-[600px] rounded-lg shadow-2xl z-10"
              />
            </div>
          </div>
        </div>
      </main>

      <footer class="mt-10 py-6 text-center text-xs font-medium text-sub">
        &copy; 2026 hamma-nyk • Hestia Background Remover
      </footer>
    </div>

    <script>
      // --- 1. THEME MANAGEMENT ---
      const themeIcon = document.getElementById("theme-icon");
      const sunIcon = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z" />`;
      const moonIcon = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />`;

      function applyTheme(theme) {
        if (theme === "light") {
          document.body.classList.remove("dark");
          document.body.classList.add("light");
          themeIcon.innerHTML = moonIcon;
        } else {
          document.body.classList.remove("light");
          document.body.classList.add("dark");
          themeIcon.innerHTML = sunIcon;
        }
        localStorage.setItem("theme", theme);
      }

      function toggleTheme() {
        const isDark = document.body.classList.contains("dark");
        applyTheme(isDark ? "light" : "dark");
      }

      // Init theme from Storage
      const savedTheme = localStorage.getItem("theme") || "dark";
      applyTheme(savedTheme);

      // --- 2. ENTRANCE ANIMATIONS ---
      window.addEventListener("DOMContentLoaded", () => {
        const animate = (id, delay) => {
          const el = document.getElementById(id);
          el.style.transition = `all 0.8s cubic-bezier(0.22, 1, 0.36, 1) ${delay}s`;
          el.style.opacity = "1";
          el.style.transform = "translateY(0)";
        };

        // Reset positions
        ["header-anim", "card-left", "card-right"].forEach((id) => {
          document.getElementById(id).style.transform = "translateY(30px)";
        });

        // Trigger
        animate("header-anim", 0.1);
        animate("card-left", 0.3);
        animate("card-right", 0.5);
      });

      // --- 3. CORE LOGIC ---
      const logBox = document.getElementById("logs");
      function addLog(msg, isErr = false) {
        const time = new Date().toLocaleTimeString([], {
          hour12: false,
          hour: "2-digit",
          minute: "2-digit",
          second: "2-digit",
        });

        // Logika warna yang cerdas:
        // Jika Error -> Merah
        // Jika Normal -> Hijau di Dark Mode, Slate-800 di Light Mode
        let colorClass = "";
        if (isErr) {
          colorClass = "text-red-500";
        } else {
          // dark:text-green-400 akan aktif saat body punya class .dark
          // text-slate-800 akan aktif saat mode light
          colorClass = "text-slate-800 dark:text-green-400";
        }

        logBox.innerHTML += `<br><span class="${colorClass}">[${time}] > ${msg}</span>`;
        logBox.scrollTop = logBox.scrollHeight;
      }

      async function processAction() {
        const fileInput = document.getElementById("file-input");
        const urlInput = document.getElementById("img-url");
        const btn = document.getElementById("btn-submit");
        const outImg = document.getElementById("output-img");
        const placeholder = document.getElementById("placeholder-ctx");
        const dlBtn = document.getElementById("download-link");

        let payload = {};
        if (fileInput.files[0]) {
          const reader = new FileReader();
          reader.readAsDataURL(fileInput.files[0]);
          addLog("Encoding local file...");
          const base64 = await new Promise((r) => {
            reader.onload = () => r(reader.result.split(",")[1]);
          });
          payload = { imageBase64: base64 };
        } else if (urlInput.value) {
          addLog("Targeting remote URL...");
          payload = { imageUrl: urlInput.value };
        } else {
          return alert("Pilih file atau URL!");
        }

        btn.disabled = true;
        btn.innerText = "Processing...";
        addLog("Requesting removal via Proxy...");

        try {
          const res = await fetch("/remove-bg", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload),
          });

          if (res.ok) {
            const blob = await res.blob();
            const url = URL.createObjectURL(blob);
            outImg.src = url;
            outImg.classList.remove("hidden");
            placeholder.classList.add("hidden");
            dlBtn.href = url;
            dlBtn.classList.remove("hidden");
            dlBtn.classList.add("flex");
            addLog("Background successfully purged!", false);
          } else {
            const data = await res.json();
            addLog(data.message || "Failed", true);
          }
        } catch (e) {
          addLog("Connection dropped", true);
        } finally {
          btn.disabled = false;
          btn.innerText = "Process Now";
        }
      }
    </script>
  </body>
</html>
